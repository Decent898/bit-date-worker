<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园慢社交匹配系统</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bit-green': '#007D44',
                        'bit-dark': '#004B28',
                        'paper': '#F9FAFB'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-paper text-gray-800">
    <div id="app"></div>

    <script>
        const { createApp, ref, reactive, computed, watch } = Vue;

        const API_BASE = window.location.origin && window.location.origin.startsWith('http')
            ? window.location.origin
            : 'http://127.0.0.1:8000';

        const app = createApp({
            template: `
                <div class="min-h-screen bg-paper py-12 px-4 sm:px-6 lg:px-8">
                    <!-- Header -->
                    <div class="max-w-4xl mx-auto mb-8">
                        <div class="flex justify-between items-center">
                            <h1 class="text-4xl font-bold text-bit-dark">💕 慢社交</h1>
                            <div v-if="currentUser" class="text-right">
                                <p class="text-bit-green">{{ currentUser.system_id }}</p>
                                <button @click="logout" class="text-red-600 hover:text-red-800 mt-2">退出登录</button>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="max-w-4xl mx-auto">
                        <!-- Login/Register Page -->
                        <div v-if="!currentUser" class="bg-white rounded-lg shadow-lg p-8">
                            <div class="mb-6">
                                <button 
                                    @click="page = 'login'"
                                    :class="page === 'login' ? 'text-bit-green border-b-2 border-bit-green' : 'text-gray-600'"
                                    class="mr-8 pb-2 font-semibold">
                                    登录
                                </button>
                                <button 
                                    @click="page = 'register'"
                                    :class="page === 'register' ? 'text-bit-green border-b-2 border-bit-green' : 'text-gray-600'"
                                    class="pb-2 font-semibold">
                                    注册
                                </button>
                            </div>

                            <!-- Login Form -->
                            <div v-if="page === 'login'" class="space-y-4">
                                <input 
                                    v-model="loginForm.email" 
                                    type="email" 
                                    placeholder="邮箱（@school.edu.cn）"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                <input 
                                    v-model="loginForm.password" 
                                    type="password" 
                                    placeholder="密码"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                <button 
                                    @click="login"
                                    :disabled="loading"
                                    class="w-full bg-bit-green hover:bg-bit-dark disabled:bg-gray-400 text-white font-semibold py-2 rounded-lg transition">
                                    {{ loading ? '登录中...' : '登录' }}
                                </button>
                                <p v-if="errorMsg" class="text-red-600 text-sm">{{ errorMsg }}</p>
                            </div>

                            <!-- Register Form -->
                            <div v-if="page === 'register'" class="space-y-4">
                                <input 
                                    v-model="registerForm.email" 
                                    type="email" 
                                    placeholder="邮箱（@school.edu.cn）"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                <div class="flex gap-2">
                                    <input 
                                        v-model="registerForm.code" 
                                        type="text" 
                                        placeholder="验证码"
                                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                    <button 
                                        @click="sendCode"
                                        :disabled="!registerForm.email || loading"
                                        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 rounded-lg font-semibold transition">
                                        {{ codeCountdown > 0 ? codeCountdown + 's' : '发送验证码' }}
                                    </button>
                                </div>
                                <input 
                                    v-model="registerForm.password" 
                                    type="password" 
                                    placeholder="密码（至少8位）"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                <button 
                                    @click="register"
                                    :disabled="loading"
                                    class="w-full bg-bit-green hover:bg-bit-dark disabled:bg-gray-400 text-white font-semibold py-2 rounded-lg transition">
                                    {{ loading ? '注册中...' : '注册' }}
                                </button>
                                <p v-if="errorMsg" class="text-red-600 text-sm">{{ errorMsg }}</p>
                                <p v-if="successMsg" class="text-green-600 text-sm">{{ successMsg }}</p>
                            </div>
                        </div>

                        <!-- Logged In Pages -->
                        <div v-else>
                            <!-- Page Tabs -->
                            <div class="bg-white rounded-t-lg shadow-lg p-4 flex gap-4 border-b">
                                <button 
                                    @click="page = 'questionnaire'"
                                    :class="page === 'questionnaire' ? 'text-bit-green border-b-2 border-bit-green' : 'text-gray-600'"
                                    class="pb-2 font-semibold">
                                    📋 问卷
                                </button>
                                <button 
                                    @click="page = 'match'"
                                    :class="page === 'match' ? 'text-bit-green border-b-2 border-bit-green' : 'text-gray-600'"
                                    class="pb-2 font-semibold">
                                    💞 我的匹配
                                </button>
                                <button 
                                    @click="page = 'profile'"
                                    :class="page === 'profile' ? 'text-bit-green border-b-2 border-bit-green' : 'text-gray-600'"
                                    class="pb-2 font-semibold">
                                    👤 个人中心
                                </button>
                            </div>

                            <!-- Questionnaire Page -->
                            <div v-if="page === 'questionnaire'" class="bg-white rounded-b-lg shadow-lg p-8 space-y-6">
                                <h2 class="text-2xl font-bold text-bit-dark">填写问卷</h2>
                                
                                <!-- Profile -->
                                <div class="space-y-3">
                                    <h3 class="text-lg font-semibold text-bit-green">基本信息</h3>
                                    <select v-model="questionnaire.profile.gender" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                        <option value="">选择性别</option>
                                        <option value="female">女</option>
                                        <option value="male">男</option>
                                    </select>
                                    <select v-model="questionnaire.profile.orientation" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                        <option value="all">取向：全部</option>
                                        <option value="same">取向：同性</option>
                                        <option value="different">取向：异性</option>
                                    </select>
                                    <input v-model.number="questionnaire.profile.age" type="number" placeholder="年龄" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                </div>

                                <!-- Objective Answers -->
                                <div class="space-y-3">
                                    <h3 class="text-lg font-semibold text-bit-green">生活习惯（1-10）</h3>
                                    <div class="space-y-2">
                                        <label class="block">
                                            <span class="text-gray-700">起床时间</span>
                                            <input v-model.number="questionnaire.objective_answers.wake_time" type="range" min="1" max="10" class="w-full">
                                            <span class="text-sm text-gray-500">{{ questionnaire.objective_answers.wake_time }}</span>
                                        </label>
                                        <label class="block">
                                            <span class="text-gray-700">睡眠时间</span>
                                            <input v-model.number="questionnaire.objective_answers.sleep_time" type="range" min="1" max="10" class="w-full">
                                            <span class="text-sm text-gray-500">{{ questionnaire.objective_answers.sleep_time }}</span>
                                        </label>
                                        <label class="block">
                                            <span class="text-gray-700">消费观念</span>
                                            <input v-model.number="questionnaire.objective_answers.spending_style" type="range" min="1" max="10" class="w-full">
                                            <span class="text-sm text-gray-500">{{ questionnaire.objective_answers.spending_style }}</span>
                                        </label>
                                        <label class="block">
                                            <span class="text-gray-700">社交频率</span>
                                            <input v-model.number="questionnaire.objective_answers.social_frequency" type="range" min="1" max="10" class="w-full">
                                            <span class="text-sm text-gray-500">{{ questionnaire.objective_answers.social_frequency }}</span>
                                        </label>
                                        <label class="block">
                                            <span class="text-gray-700">运动量</span>
                                            <input v-model.number="questionnaire.objective_answers.exercise" type="range" min="1" max="10" class="w-full">
                                            <span class="text-sm text-gray-500">{{ questionnaire.objective_answers.exercise }}</span>
                                        </label>
                                    </div>
                                </div>

                                <!-- Personality -->
                                <div class="space-y-3">
                                    <h3 class="text-lg font-semibold text-bit-green">性格特质</h3>
                                    <select v-model="questionnaire.personality_traits.role" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                        <option value="">选择角色</option>
                                        <option value="leader">领导者</option>
                                        <option value="supporter">支持者</option>
                                        <option value="planner">计划者</option>
                                        <option value="explorer">探险家</option>
                                    </select>
                                </div>

                                <!-- Preferences -->
                                <div class="space-y-3">
                                    <h3 class="text-lg font-semibold text-bit-green">偏好</h3>
                                    <input v-model.number="questionnaire.preferences.min_age" type="number" placeholder="最小年龄" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                    <input v-model.number="questionnaire.preferences.max_age" type="number" placeholder="最大年龄" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                </div>

                                <!-- Tags -->
                                <div class="space-y-3">
                                    <h3 class="text-lg font-semibold text-bit-green">兴趣标签（用逗号分隔）</h3>
                                    <textarea 
                                        v-model="tagsInput" 
                                        placeholder="例如：音乐,电影,运动"
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg h-20"></textarea>
                                </div>

                                <!-- Opt-in -->
                                <label class="flex items-center space-x-2">
                                    <input 
                                        v-model="questionnaire.opt_in_weekly" 
                                        type="checkbox"
                                        class="w-4 h-4 text-bit-green">
                                    <span class="text-gray-700">我想参与本周匹配 ✨</span>
                                </label>

                                <button 
                                    @click="saveQuestionnaire"
                                    :disabled="loading"
                                    class="w-full bg-bit-green hover:bg-bit-dark disabled:bg-gray-400 text-white font-semibold py-2 rounded-lg transition">
                                    {{ loading ? '保存中...' : '保存问卷' }}
                                </button>
                                <p v-if="successMsg" class="text-green-600 text-center">{{ successMsg }}</p>
                            </div>

                            <!-- Match Page -->
                            <div v-if="page === 'match'" class="bg-white rounded-b-lg shadow-lg p-8">
                                <h2 class="text-2xl font-bold text-bit-dark mb-6">💞 我的本周匹配</h2>
                                
                                <div v-if="currentMatch" class="space-y-6">
                                    <!-- Match Card -->
                                    <div class="bg-gradient-to-r from-green-50 to-emerald-100 p-8 rounded-lg border-2 border-green-200">
                                        <p class="text-gray-700 text-sm mb-2">你的匹配对象</p>
                                        <p class="text-3xl font-bold text-bit-green mb-4">{{ currentMatch.partner_system_id }}</p>
                                        <div class="bg-white rounded-lg p-4 mb-4">
                                            <p class="text-sm font-semibold text-gray-600 mb-2">匹配分数</p>
                                            <div class="flex items-center space-x-2">
                                                <div class="flex-1 bg-gray-200 rounded-full h-2">
                                                    <div class="h-2 rounded-full bg-gradient-to-r from-yellow-400 to-red-500" :style="{width: currentMatch.score + '%'}"></div>
                                                </div>
                                                <span class="text-2xl font-bold text-bit-green">{{ currentMatch.score.toFixed(1) }}%</span>
                                            </div>
                                        </div>
                                        
                                        <!-- Reason from DeepSeek -->
                                        <div class="bg-white rounded-lg p-4">
                                            <p class="text-sm font-semibold text-gray-600 mb-2">🎯 为什么我们会匹配</p>
                                            <p class="text-gray-800 leading-relaxed">{{ currentMatch.reason_text }}</p>
                                        </div>
                                    </div>

                                    <!-- Contact Form -->
                                    <div class="bg-green-50 rounded-lg p-6 border border-green-200">
                                        <h3 class="text-lg font-semibold text-bit-dark mb-4">📮 发送留言</h3>
                                        <textarea 
                                            v-model="contactMessage" 
                                            placeholder="给对方写些话吧..."
                                            class="w-full px-4 py-3 border border-green-300 rounded-lg mb-4 h-24"></textarea>
                                        <button 
                                            @click="sendContact"
                                            :disabled="loading"
                                            class="w-full bg-bit-green hover:bg-bit-dark disabled:bg-gray-400 text-white font-semibold py-2 rounded-lg transition">
                                            {{ loading ? '发送中...' : '发送留言' }}
                                        </button>
                                        <p v-if="successMsg" class="text-green-600 text-center mt-2">{{ successMsg }}</p>
                                    </div>
                                </div>

                                <div v-else class="text-center py-12">
                                    <p class="text-xl text-gray-600 mb-4">😊 还没有匹配结果</p>
                                    <p class="text-gray-500 mb-6">完整填写问卷&参与本周匹配后，周二晚9点就能看到结果</p>
                                    <button 
                                        @click="page = 'questionnaire'"
                                        class="bg-bit-green hover:bg-bit-dark text-white font-semibold py-2 px-6 rounded-lg">
                                        去填问卷
                                    </button>
                                </div>
                            </div>

                            <!-- Profile Page -->
                            <div v-if="page === 'profile'" class="bg-white rounded-b-lg shadow-lg p-8">
                                <h2 class="text-2xl font-bold text-bit-dark mb-6">👤 个人中心</h2>
                                
                                <div class="space-y-4">
                                    <div class="bg-green-50 rounded-lg p-4 border border-green-200">
                                        <p class="text-sm text-gray-600">系统 ID（匿名）</p>
                                        <p class="text-xl font-semibold text-bit-dark">{{ currentUser.system_id }}</p>
                                    </div>
                                    
                                    <div class="bg-emerald-50 rounded-lg p-4 border border-emerald-200">
                                        <p class="text-sm text-gray-600">邮箱</p>
                                        <p class="text-lg text-bit-dark">{{ currentUser.email }}</p>
                                    </div>

                                    <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
                                        <p class="text-sm text-gray-600">已参与周数</p>
                                        <p class="text-2xl font-bold text-gray-900">{{ userStats.weeks_participated }}</p>
                                    </div>

                                    <div class="bg-green-100 rounded-lg p-4 border border-green-300">
                                        <p class="text-sm text-gray-600">已成功配对</p>
                                        <p class="text-2xl font-bold text-bit-green">{{ userStats.successful_matches }}</p>
                                    </div>
                                </div>

                                <button 
                                    @click="logout"
                                    class="w-full mt-8 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded-lg transition">
                                    退出登录
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-12 text-gray-600">
                        <p>🎓 校园慢社交 | <a href="http://127.0.0.1:8000/docs" target="_blank" class="text-bit-green hover:underline">API 文档</a></p>
                    </div>
                </div>
            `,
            setup() {
                const page = ref('login');
                const loading = ref(false);
                const errorMsg = ref('');
                const successMsg = ref('');
                const codeCountdown = ref(0);

                const currentUser = ref(null);
                const currentMatch = ref(null);
                const contactMessage = ref('');

                const loginForm = reactive({
                    email: '',
                    password: ''
                });

                const registerForm = reactive({
                    email: '',
                    code: '',
                    password: ''
                });

                const questionnaire = reactive({
                    profile: {
                        gender: '',
                        orientation: 'all',
                        age: 20
                    },
                    objective_answers: {
                        sleep_time: 5,
                        wake_time: 5,
                        spending_style: 5,
                        social_frequency: 5,
                        exercise: 5
                    },
                    personality_traits: {
                        role: ''
                    },
                    preferences: {
                        min_age: 18,
                        max_age: 25
                    },
                    tags: [],
                    opt_in_weekly: false
                });

                const tagsInput = ref('');

                const userStats = reactive({
                    weeks_participated: 0,
                    successful_matches: 0
                });

                // Load user from localStorage
                const loadUser = () => {
                    const token = localStorage.getItem('token');
                    const email = localStorage.getItem('email');
                    const system_id = localStorage.getItem('system_id');
                    if (token && email && system_id) {
                        currentUser.value = { token, email, system_id };
                        loadQuestionnaire();
                        loadMatch();
                    }
                };

                const sendCode = async () => {
                    errorMsg.value = '';
                    try {
                        const res = await axios.post(`${API_BASE}/api/auth/send-code`, {
                            email: registerForm.email
                        });
                        const code = res.data?.dev_code;
                        const backendMessage = res.data?.message;
                        if (backendMessage) {
                            successMsg.value = backendMessage;
                            if (code) {
                                successMsg.value += ` 验证码：${code}`;
                            }
                        } else if (code) {
                            successMsg.value = `验证码已发送，当前验证码：${code}`;
                        } else {
                            successMsg.value = '验证码已发送，请查收邮箱';
                        }
                        codeCountdown.value = 60;
                        const interval = setInterval(() => {
                            codeCountdown.value--;
                            if (codeCountdown.value <= 0) clearInterval(interval);
                        }, 1000);
                    } catch (err) {
                        errorMsg.value = err.response?.data?.detail || err.response?.data?.message || '发送失败：请检查后端是否启动，或浏览器是否拦截了跨域请求';
                    }
                };

                const register = async () => {
                    errorMsg.value = '';
                    successMsg.value = '';
                    if (!registerForm.email || !registerForm.code || !registerForm.password) {
                        errorMsg.value = '请填写所有字段';
                        return;
                    }
                    loading.value = true;
                    try {
                        const res = await axios.post(`${API_BASE}/api/auth/register`, {
                            email: registerForm.email,
                            code: registerForm.code,
                            password: registerForm.password
                        });
                        localStorage.setItem('token', res.data.access_token);
                        localStorage.setItem('email', registerForm.email);
                        localStorage.setItem('system_id', res.data.system_id);
                        currentUser.value = {
                            token: res.data.access_token,
                            email: registerForm.email,
                            system_id: res.data.system_id
                        };
                        page.value = 'questionnaire';
                    } catch (err) {
                        errorMsg.value = err.response?.data?.detail || '注册失败';
                    } finally {
                        loading.value = false;
                    }
                };

                const login = async () => {
                    errorMsg.value = '';
                    if (!loginForm.email || !loginForm.password) {
                        errorMsg.value = '请填写邮箱和密码';
                        return;
                    }
                    loading.value = true;
                    try {
                        const res = await axios.post(`${API_BASE}/api/auth/login`, {
                            email: loginForm.email,
                            password: loginForm.password
                        });
                        localStorage.setItem('token', res.data.access_token);
                        localStorage.setItem('email', loginForm.email);
                        localStorage.setItem('system_id', res.data.system_id);
                        currentUser.value = {
                            token: res.data.access_token,
                            email: loginForm.email,
                            system_id: res.data.system_id
                        };
                        page.value = 'questionnaire';
                    } catch (err) {
                        errorMsg.value = err.response?.data?.detail || '登录失败';
                    } finally {
                        loading.value = false;
                    }
                };

                const saveQuestionnaire = async () => {
                    successMsg.value = '';
                    errorMsg.value = '';
                    loading.value = true;
                    try {
                        await axios.put(
                            `${API_BASE}/api/questionnaire`,
                            {
                                ...questionnaire,
                                tags: tagsInput.value.split(',').map(t => t.trim()).filter(Boolean)
                            },
                            {
                                headers: {
                                    'Authorization': `Bearer ${currentUser.value.token}`
                                }
                            }
                        );
                        successMsg.value = '问卷已保存！';
                    } catch (err) {
                        errorMsg.value = err.response?.data?.detail || '保存失败';
                    } finally {
                        loading.value = false;
                    }
                };

                const loadQuestionnaire = async () => {
                    try {
                        const res = await axios.get(`${API_BASE}/api/questionnaire`, {
                            headers: { 'Authorization': `Bearer ${currentUser.value.token}` }
                        });
                        Object.assign(questionnaire, res.data);
                        tagsInput.value = questionnaire.tags.join(', ');
                    } catch (err) {
                        console.error('加载问卷失败', err);
                    }
                };

                const loadMatch = async () => {
                    try {
                        const res = await axios.get(`${API_BASE}/api/matches/current`, {
                            headers: { 'Authorization': `Bearer ${currentUser.value.token}` }
                        });
                        currentMatch.value = res.data;
                    } catch (err) {
                        currentMatch.value = null;
                    }
                };

                const sendContact = async () => {
                    if (!contactMessage.value.trim()) {
                        errorMsg.value = '请输入留言内容';
                        return;
                    }
                    loading.value = true;
                    try {
                        await axios.post(
                            `${API_BASE}/api/contact/message`,
                            { message: contactMessage.value },
                            {
                                headers: { 'Authorization': `Bearer ${currentUser.value.token}` }
                            }
                        );
                        successMsg.value = '留言已发送！';
                        contactMessage.value = '';
                    } catch (err) {
                        errorMsg.value = err.response?.data?.detail || '发送失败';
                    } finally {
                        loading.value = false;
                    }
                };

                const logout = () => {
                    localStorage.removeItem('token');
                    localStorage.removeItem('email');
                    localStorage.removeItem('system_id');
                    currentUser.value = null;
                    currentMatch.value = null;
                    page.value = 'login';
                    loginForm.email = '';
                    loginForm.password = '';
                };

                loadUser();

                return {
                    page, loading, errorMsg, successMsg, codeCountdown,
                    currentUser, currentMatch, contactMessage,
                    loginForm, registerForm, questionnaire, tagsInput,
                    userStats,
                    sendCode, register, login, saveQuestionnaire,
                    loadMatch, sendContact, logout
                };
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
